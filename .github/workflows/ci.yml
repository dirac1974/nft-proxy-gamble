name: CI

on:
  push:
    branches: [main, "phase-*/**"]
  pull_request:

jobs:
  contracts:
    name: Contracts (compile, test, coverage, gas)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Coverage (threshold gate)
        run: |
          npm run coverage
          node -e "
            // solidity-coverage writes Istanbul per-file data to coverage.json.
            // Phase 1 thresholds (per docs/DEVELOPMENT_MEMORY.md §3) apply to the main contract.
            // Mocks under src/mocks/ are test scaffolding and excluded here. We compute totals
            // from coverage.json directly (skipFiles has a known interaction with paths.sources).
            const c = require('./coverage.json');
            const tot = { s: { hit: 0, total: 0 }, f: { hit: 0, total: 0 }, b: { hit: 0, total: 0 }, l: { hit: 0, total: 0 } };
            const include = (file) => !/[\\/]mocks[\\/]/.test(file) && file.endsWith('.sol');
            for (const file of Object.keys(c)) {
              if (!include(file)) continue;
              const d = c[file];
              for (const k of Object.keys(d.s)) { tot.s.total++; if (d.s[k] > 0) tot.s.hit++; }
              for (const k of Object.keys(d.f)) { tot.f.total++; if (d.f[k] > 0) tot.f.hit++; }
              for (const k of Object.keys(d.b)) { for (const v of d.b[k]) { tot.b.total++; if (v > 0) tot.b.hit++; } }
              const lineSeen = new Set();
              for (const k of Object.keys(d.statementMap)) {
                const line = d.statementMap[k].start.line;
                if (!lineSeen.has(line)) { lineSeen.add(line); tot.l.total++; if (d.s[k] > 0) tot.l.hit++; }
              }
            }
            const pct = (h, t) => t === 0 ? 100 : (h * 100 / t);
            const stmtPct = pct(tot.s.hit, tot.s.total);
            const brPct   = pct(tot.b.hit, tot.b.total);
            const fnPct   = pct(tot.f.hit, tot.f.total);
            const linePct = pct(tot.l.hit, tot.l.total);
            console.log('Coverage (excluding src/mocks/):');
            console.log('  statements ' + stmtPct.toFixed(2) + '% (' + tot.s.hit + '/' + tot.s.total + ')');
            console.log('  branches   ' + brPct.toFixed(2)   + '% (' + tot.b.hit + '/' + tot.b.total + ')');
            console.log('  functions  ' + fnPct.toFixed(2)   + '% (' + tot.f.hit + '/' + tot.f.total + ')');
            console.log('  lines      ' + linePct.toFixed(2) + '% (' + tot.l.hit + '/' + tot.l.total + ')');
            const fail = [];
            if (stmtPct < 92) fail.push('statements ' + stmtPct.toFixed(2) + ' < 92');
            if (brPct   < 88) fail.push('branches '   + brPct.toFixed(2)   + ' < 88');
            if (fnPct   < 95) fail.push('functions '  + fnPct.toFixed(2)   + ' < 95');
            if (linePct < 92) fail.push('lines '      + linePct.toFixed(2) + ' < 92');
            if (fail.length) { console.error('COVERAGE FAIL:', fail.join('; ')); process.exit(1); }
            console.log('All coverage thresholds met.');
          "

      - name: Gas snapshot
        env:
          REPORT_GAS: "true"
          GAS_REPORT_FILE: "gasReport.txt"
        run: npm test

      - name: Upload gas report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: contracts/gasReport.txt
          if-no-files-found: ignore

  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: contracts
    continue-on-error: true # soft-fail until findings are triaged; tighten after first clean run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
        working-directory: contracts
      - uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          solc-version: 0.8.24
          fail-on: high
          slither-args: --filter-paths "node_modules|src/mocks"

  # Backend job is gated behind Phase 2 — only runs once a package-lock.json exists.
  backend:
    name: Backend (Phase 2+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check-lock
        run: |
          if [ -f backend/package-lock.json ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "Backend lockfile not present yet (Phase 2 hasn't shipped) — skipping."
            echo "ready=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check-lock.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - if: steps.check-lock.outputs.ready == 'true'
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm test
